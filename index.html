  function spriteAt(g,cx,cy,ps,map,alpha,glow){ if(alpha<=0.01)return; const w=g[0].length*ps, h=g.length*ps, x=Math.round(cx-w/2), y=Math.round(cy-h/2);

    ctx.restore(); }
  function drawSprite(g,x,y,ps,map){ for(let r=0;r<g.length;r++){const row=g[r]; for(let c=0;c<row.length;c++){const ch=row[c]; if(ch==='.'||ch===' ')continue; const col=map[ch]; if(!col)continue; ctx.fillStyle=col; ctx.fillRect(Math.round(x+c*ps),Math.round(y+r*ps),ps,ps);}}}

  let W=0,H=0,dpr=1,land=false,SX=0,SY=0,SW=0,SH=0,PX=0,PY=0,PW=0,PH=0,rx=0,ry=0,rw=0,rh=0,gy=0,U=1,stars=[];
  function resize(){ dpr=Math.min(window.devicePixelRatio||1,2);
    const rect=stage.getBoundingClientRect(); W=rect.width; H=rect.height;
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=false;

  }
  function cpt(i){ return [rx+CITY[i].nx*rw, ry+CITY[i].ny*rh]; }
  function easeIO(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function diamond(x,y,s){ ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x+s,y); ctx.lineTo(x,y+s); ctx.lineTo(x-s,y); ctx.closePath(); }

  function sun(cx,cy,r,col,al){ if(al<=0.01)return; ctx.save(); ctx.globalAlpha=al; const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r); g.addColorStop(0,col); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,6.28); ctx.fill(); ctx.restore(); }
  function atom(cx,cy,r,col,al){ if(al<=0.01)return; ctx.save(); ctx.globalAlpha=al; ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.shadowColor=col; ctx.shadowBlur=10;
    for(let k=0;k<3;k++){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(k*Math.PI/3 + T*0.0006); ctx.beginPath(); ctx.ellipse(0,0,r,r*0.4,0,0,6.28); ctx.stroke(); ctx.restore(); }
    const ea=T*0.003; ctx.fillStyle="#fff"; ctx.fillRect(cx+Math.cos(ea)*r-2,cy+Math.sin(ea)*r*0.4-2,4,4);
    ctx.fillStyle=col; ctx.fillRect(cx-3,cy-3,6,6); ctx.restore(); }
  function building(cx,by,w,h,col,al){ if(al<=0.01)return; ctx.save(); ctx.globalAlpha=al; ctx.fillStyle=col; ctx.fillRect(cx-w/2,by-h,w,h);
    ctx.fillStyle="rgba(255,235,170,0.65)"; const wx=Math.max(2,Math.floor(w/7)); for(let yy=by-h+wx;yy<by-wx;yy+=wx*2)for(let xx=cx-w/2+wx;xx<cx+w/2-wx;xx+=wx*2)ctx.fillRect(xx,yy,wx,wx);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx+w/2+6,by); ctx.lineTo(cx+w/2+6,by-h-18); ctx.lineTo(cx+w/2+6-w*0.7,by-h-18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+w/2+6-w*0.6,by-h-18); ctx.lineTo(cx+w/2+6-w*0.6,by-h-6); ctx.stroke(); ctx.restore(); }
  function college(cx,by,w,h,col,al){ if(al<=0.01)return; ctx.save(); ctx.globalAlpha=al; ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(cx-w/2-5,by-h+9); ctx.lineTo(cx,by-h-7); ctx.lineTo(cx+w/2+5,by-h+9); ctx.closePath(); ctx.fill();
    ctx.fillRect(cx-w/2-5,by-h+9,w+10,4);
    const cols=4, gap=w/cols; for(let i=0;i<=cols;i++){ const xx=cx-w/2+i*gap; ctx.fillRect(xx-2,by-h+15,4,h-17); }
    ctx.fillRect(cx-w/2-7,by-4,w+14,4); ctx.restore(); }
  function chart(x,by,w,h,col,al){ if(al<=0.01)return; ctx.save(); ctx.globalAlpha=al; const bars=5,gap=w/bars,bw=gap*0.6,hs=[0.4,0.7,0.5,0.95,0.7]; ctx.shadowColor=col; ctx.shadowBlur=6;
    for(let i=0;i<bars;i++){ ctx.fillStyle=col; ctx.fillRect(x+i*gap, by-h*hs[i], bw, h*hs[i]); }
    ctx.globalAlpha=al*0.5; ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(x-2,by); ctx.lineTo(x+w,by); ctx.stroke(); ctx.restore(); }
  function netw(cx,cy,r,col,al){ if(al<=0.01)return; const n=[[0,0],[Math.cos(0.3)*r,Math.sin(0.3)*r],[Math.cos(2.2)*r,Math.sin(2.2)*r*0.8],[Math.cos(3.9)*r,Math.sin(3.9)*r],[Math.cos(5.2)*r,Math.sin(5.2)*r*0.7]];
    ctx.save(); ctx.globalAlpha=al; ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.shadowColor=col; ctx.shadowBlur=8;
    for(let i=1;i<n.length;i++){ ctx.beginPath(); ctx.moveTo(cx+n[0][0],cy+n[0][1]); ctx.lineTo(cx+n[i][0],cy+n[i][1]); ctx.stroke(); }
    ctx.fillStyle=col; for(const nn of n){ ctx.fillRect(cx+nn[0]-2,cy+nn[1]-2,5,5); } ctx.restore(); }

  function drawTheme(idx,al,focus){ if(al<=0.02)return; const c=CITY[idx].a, EA=al, FA=al*focus;
    const ox=Math.sin(T*0.0003)*7, oy=Math.cos(T*0.00026)*5;
    ctx.save(); ctx.globalAlpha=al*(0.20+0.20*focus); const wash=ctx.createLinearGradient(0,gy,0,SY); wash.addColorStop(0,c); wash.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=wash; ctx.fillRect(SX,SY,SW,SH); ctx.restore();
    if(idx===0){ // Kashmir: agri + solar
      sun(SX+SW*0.80+ox,SY+SH*0.10+oy,Math.min(SW,SH)*0.18,"rgba(255,222,150,0.65)",EA*0.85);
      ctx.save(); ctx.globalAlpha=EA*0.45; ctx.fillStyle="#1b2b46"; ctx.beginPath(); ctx.moveTo(SX,gy);
      const pk=[0.12,0.06,0.15,0.07,0.13,0.08,0.14,0.06,0.12]; for(let i=0;i<pk.length;i++){const x=SX+(i/(pk.length-1))*SW; ctx.lineTo(x,gy-pk[i]*SH);} ctx.lineTo(SX+SW,gy); ctx.closePath(); ctx.fill(); ctx.restore();
      spriteAt(S_TREE,SX+SW*0.12+ox,gy-30*U,U*4.2,{g:"#3f8f54",r:"#e1574a",t:"#7a4a2a"},EA,null);
      spriteAt(S_TREE,SX+SW*0.30+ox,gy-22*U,U*3.0,{g:"#3f8f54",r:"#e1574a",t:"#7a4a2a"},EA*0.92,null);
      spriteAt(S_TREE,SX+SW*0.90+ox,gy-26*U,U*3.6,{g:"#3f8f54",r:"#e1574a",t:"#7a4a2a"},EA*0.95,null);
      spriteAt(S_SOLAR,SX+SW*0.20+ox,SY+SH*0.13+oy,U*3.4,{f:"#4d7fc0",p:"#7a8090"},EA*0.95,c);
      spriteAt(S_CRATE,SX+SW*0.22+ox,gy-8*U,U*2.8,{d:"#9a7b46"},FA,c);
      spriteAt(S_CRATE,SX+SW*0.27+ox,gy-8*U,U*2.4,{d:"#9a7b46"},FA*0.9,c);
      spriteAt(S_SOLAR,SX+SW*0.70+ox,SY+SH*0.10+oy,U*2.4,{f:"#4d7fc0",p:"#7a8090"},FA,c);
    } else if(idx===1){ // Maharashtra: ed-tech (Byju's)
      spriteAt(S_CAP,SX+SW*0.15+ox,SY+SH*0.12+oy,U*3.6,{o:"#ece6d2",m:"#34304e",t:GOLD},EA,c);
      spriteAt(S_SCREEN,SX+SW*0.85+ox,SY+SH*0.14+oy,U*3.0,{s:"#cfd6e6",b:c},EA*0.95,c);
      spriteAt(S_BOOK,SX+SW*0.84+ox,gy-16*U,U*3.4,{b:"#c98a3a",w:"#f2ead4"},EA,c);
      spriteAt(S_BOOK,SX+SW*0.78+ox,gy-16*U,U*3.4,{b:"#5b8fd0",w:"#f2ead4"},EA*0.9,c);
      spriteAt(S_CHALK,SX+SW*0.50+ox,SY+SH*0.16+oy,U*3.2,{d:"#2c5240",a:"#eef0e0"},FA,c);
      spriteAt(S_PERSON,SX+SW*0.14+ox,gy-8*U,U*2.8,{o:c},FA);

    } else if(idx===2){ // Jammu: ed-tech (PhysicsWallah, exam-prep)

      building(SX+SW*0.14+ox,gy,SW*0.14,SH*0.22,"#27406a",EA);
      spriteAt(S_BOOK,SX+SW*0.30+ox,gy-16*U,U*3.2,{b:"#5b8fd0",w:"#f2ead4"},EA,c);
      spriteAt(S_PERSON,SX+SW*0.40+ox,gy-8*U,U*2.8,{o:c},EA*0.9);
      spriteAt(S_PERSON,SX+SW*0.46+ox,gy-8*U,U*2.8,{o:"#bcd6ff"},EA*0.85);

      spriteAt(S_BOX,SX+SW*0.94+ox,gy-6*U,U*2.4,{p:"#caa86a"},EA*0.9);
      netw(SX+SW*0.28+ox,SY+SH*0.14+oy,Math.min(SW,SH)*0.09,c,EA);
      // up arrow 0->1
      ctx.save(); ctx.globalAlpha=EA*0.7; ctx.strokeStyle=c; ctx.lineWidth=2.5; ctx.shadowColor=c; ctx.shadowBlur=6;
      const axx=SX+SW*0.50+ox, ayy=SY+SH*0.20; ctx.beginPath(); ctx.moveTo(axx,ayy+18); ctx.lineTo(axx,ayy-10); ctx.lineTo(axx-5,ayy-4); ctx.moveTo(axx,ayy-10); ctx.lineTo(axx+5,ayy-4); ctx.stroke(); ctx.restore();
      college(SX+SW*0.14+ox,gy,SW*0.13,SH*0.14,"#caa86a",FA);
      spriteAt(S_BOX,SX+SW*0.86+ox,gy-13*U,U*2.6,{p:"#caa86a"},FA);
      spriteAt(S_SCREEN,SX+SW*0.40+ox,SY+SH*0.15+oy,U*2.6,{s:"#cfd6e6",b:c},FA,c);
    }
  }

  let bgp=[];
  function spawnBg(){ const i=chapter, rate=0.22+focusAmt*0.28; if(Math.random()>rate)return;
    if(i===0){ bgp.push({x:SX+Math.random()*SW,y:SY-6,vx:(Math.random()-0.5)*0.2,vy:0.3+Math.random()*0.4,life:1,col:"230,90,74"}); }
    else { const col=i===1?"255,207,107":i===2?"111,176,255":"255,155,107"; bgp.push({x:rx+Math.random()*rw,y:gy,vx:(Math.random()-0.5)*0.2,vy:-(0.3+Math.random()*0.5),life:1,col:col}); }
  }

  let chapter=0,captured=[0],phase="story",parts=[],rings=[],capAlpha=0,prevChapter=0,themeMix=1,focusAmt=0.4,paused=false,interacted=false;
  let T=0,prevTs=null,capStartT=0,hopStartT=0,lastSpark=0; const HOP=1500, CHARMS=27, HOLD_AFTER=2300, HOLD_END=3300;

  function setChapter(i){ prevChapter=chapter; chapter=i; themeMix=0; capStartT=T; }
  function beginMove(){ phase="move"; hopStartT=T; }
  function arrive(nc){ const p=cpt(nc); rings.push({x:p[0],y:p[1],t:0,col:CITY[nc].a});
    for(let k=0;k<22;k++){const a=Math.random()*6.28,s=0.6+Math.random()*2.4; parts.push({x:p[0],y:p[1],vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:CITY[nc].a});} }
  function reset(){ chapter=0; prevChapter=0; themeMix=1; captured=[0]; phase="story"; parts=[]; rings=[]; bgp=[]; capStartT=T; }
  function jumpTo(i){ prevChapter=chapter; chapter=i; themeMix=0; captured=[]; for(let k=0;k<=i;k++)captured.push(k); phase="story"; capStartT=T; parts=[]; rings=[]; arrive(i); }

  function trailPos(){
    if(phase==="story"){ const b=cpt(chapter); return [b[0],b[1]-Math.abs(Math.sin(T*0.004))*2]; }
    const a=cpt(chapter), b=cpt(chapter+1);
    let t=(T-hopStartT)/HOP; if(t>1)t=1; const te=easeIO(t);
    let dx=b[0]-a[0],dy=b[1]-a[1],len=Math.hypot(dx,dy)||1, off=Math.min(90,len*0.16)*(chapter%2?-1:1);
    const mx=(a[0]+b[0])/2+(-dy/len)*off, my=(a[1]+b[1])/2+(dx/len)*off, u=1-te;
    const x=u*u*a[0]+2*u*te*mx+te*te*b[0], y=u*u*a[1]+2*u*te*my+te*te*b[1];
    if(T-lastSpark>40){ lastSpark=T; parts.push({x:x,y:y,vx:(Math.random()-0.5)*0.6,vy:(Math.random()-0.5)*0.6,life:0.8,col:"255,232,170"}); }
    if(t>=1){ const nc=chapter+1; captured.push(nc); arrive(nc); phase="story"; setChapter(nc); }
    return [x,y];
  }
  function wrap(text,maxW){ const words=text.split(' '); const lines=[]; let cur='';
    for(const w of words){ const test=cur?cur+' '+w:w; if(ctx.measureText(test).width>maxW && cur){ lines.push(cur); cur=w; } else cur=test; } if(cur)lines.push(cur); return lines; }

  function drawAll(kp){
    ctx.imageSmoothingEnabled=false;
    ctx.fillStyle="#070810"; ctx.fillRect(0,0,W,H);
    for(const st of stars){ const tw=0.5+0.5*Math.sin(T*0.002+st.p); ctx.fillStyle="rgba(190,205,255,"+tw*0.4+")"; ctx.fillRect(st.x,st.y,st.s,st.s); }

    if(prevChapter!==chapter){ drawTheme(prevChapter,(1-themeMix),0); drawTheme(chapter,themeMix,focusAmt); } else drawTheme(chapter,1,focusAmt);

    for(let i=bgp.length-1;i>=0;i--){const p=bgp[i]; p.x+=p.vx;p.y+=p.vy;p.life-=0.009; if(p.life<=0||p.y>SY+SH){bgp.splice(i,1);continue;}
      ctx.globalAlpha=p.life*0.6; ctx.fillStyle="rgb("+p.col+")"; ctx.fillRect(Math.round(p.x),Math.round(p.y),2,2); ctx.globalAlpha=1; }

    const vg=ctx.createRadialGradient(SX+SW/2,SY+SH*0.5,SH*0.3,SX+SW/2,SY+SH*0.5,Math.max(SW,SH)*0.7);
    vg.addColorStop(0,"rgba(7,8,16,0)"); vg.addColorStop(1,"rgba(3,3,9,0.45)"); ctx.fillStyle=vg; ctx.fillRect(SX,SY,SW,SH);

    // traveled glowing trail only (no preview of future stops)
    if(chapter>0||phase==="move"){
      ctx.save(); ctx.shadowColor="rgba(255,216,140,0.9)"; ctx.shadowBlur=14; ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.strokeStyle="rgba(255,224,150,0.92)"; ctx.lineWidth=3; ctx.beginPath();
      for(let i=0;i<=chapter;i++){const p=cpt(i); i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);}
      if(phase==="move")ctx.lineTo(kp[0],kp[1]); ctx.stroke(); ctx.restore();
    }

    // pins + labels: ONLY revealed cities (i <= chapter)
    for(let i=0;i<=chapter;i++){ const p=cpt(i), cur=(i===chapter), pulse=0.5+0.5*Math.sin(T*0.005+i), s=Math.max(4,Math.min(SW,SH)*0.014);
      ctx.save(); ctx.shadowColor=CITY[i].a; ctx.shadowBlur=14;
      ctx.fillStyle=CITY[i].a; diamond(p[0],p[1],s); ctx.fill(); ctx.restore();
      ctx.globalAlpha=0.95; ctx.fillStyle="#fffaf0"; diamond(p[0],p[1],s*0.42); ctx.fill(); ctx.globalAlpha=1;
      if(cur){ const rr=s+4+(T%1100)/1100*s*2, ra=1-(T%1100)/1100; ctx.globalAlpha=ra*0.6; ctx.strokeStyle=CITY[i].a; ctx.lineWidth=1.5; diamond(p[0],p[1],rr); ctx.stroke(); ctx.globalAlpha=1; }
      const lf=Math.max(7,Math.min(10,Math.floor(Math.min(SW,SH)/46)));
      ctx.font=lf+'px "Press Start 2P", monospace'; ctx.textAlign=CITY[i].al; ctx.textBaseline='middle';
      ctx.save(); ctx.shadowColor=CITY[i].a; ctx.shadowBlur=cur?6:0; ctx.fillStyle="#f4efe0"; ctx.globalAlpha=0.95;
      ctx.fillText(CITY[i].label, p[0]+CITY[i].lx, p[1]+CITY[i].ly); ctx.restore(); ctx.globalAlpha=1;
    }

    for(let i=rings.length-1;i>=0;i--){const rg=rings[i]; rg.t+=0.03; if(rg.t>=1){rings.splice(i,1);continue;}
      ctx.globalAlpha=(1-rg.t)*0.7; ctx.strokeStyle=rg.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(rg.x,rg.y,rg.t*Math.min(SW,SH)*0.08,0,6.28); ctx.stroke(); ctx.globalAlpha=1; }
    for(let i=parts.length-1;i>=0;i--){const pt=parts[i]; pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.04;pt.life-=0.025;
      if(pt.life<=0){parts.splice(i,1);continue;} ctx.globalAlpha=pt.life; ctx.fillStyle=(""+pt.col).indexOf(',')>=0?"rgb("+pt.col+")":pt.col; ctx.fillRect(Math.round(pt.x),Math.round(pt.y),2,2); ctx.globalAlpha=1; }

    const ps=Math.max(2,Math.floor(Math.min(SW,SH)*0.05/12)); const sw=12*ps, sh=13*ps, ox=Math.round(kp[0]-sw/2), oy=Math.round(kp[1]-sh/2);
    ctx.save(); const kg=ctx.createRadialGradient(kp[0],kp[1],0,kp[0],kp[1],sw); kg.addColorStop(0,"rgba(255,238,200,0.5)"); kg.addColorStop(1,"rgba(255,238,200,0)"); ctx.fillStyle=kg; ctx.beginPath(); ctx.arc(kp[0],kp[1],sw,0,6.28); ctx.fill(); ctx.restore();
    drawSprite(KN,ox,oy,ps,{o:"#1b1c28",b:"#f8f3e6",m:"#d3c4a2"});

    // HUD
    ctx.font='8px "Press Start 2P", monospace'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.globalAlpha=0.6; ctx.fillStyle=GOLD; ctx.fillText("MURSALEEN", SX+16, SY+24);
    ctx.globalAlpha=0.4; ctx.fillStyle="#cdd6ea"; ctx.fillText("THE JOURNEY", SX+16, SY+38); ctx.globalAlpha=1;
    const cox=SX+SW-22, coy=SY+30; ctx.globalAlpha=0.5; ctx.strokeStyle=GOLD; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cox,coy+7); ctx.lineTo(cox,coy-7); ctx.lineTo(cox-3,coy-3); ctx.moveTo(cox,coy-7); ctx.lineTo(cox+3,coy-3); ctx.stroke();
    ctx.font='6px "Press Start 2P", monospace'; ctx.textAlign='center'; ctx.fillStyle=GOLD; ctx.fillText("N",cox,coy-13); ctx.globalAlpha=1;
    for(let i=0;i<CITY.length;i++){ const dx=SX+SW/2-(CITY.length-1)*9+i*18, dy=SY+SH-14; const on=i<=chapter;
      ctx.globalAlpha=on?0.9:0.22; ctx.fillStyle=on?CITY[chapter].a:"#4a5070"; const r=i===chapter?3:2; ctx.fillRect(dx-r,dy-r,r*2,r*2); ctx.globalAlpha=1; }
    if(!interacted && T<7000){ const ha=Math.min(1,(7000-T)/1500); ctx.globalAlpha=ha*0.6; ctx.font='7px "Press Start 2P", monospace'; ctx.textAlign='center'; ctx.fillStyle="#cdd6ea"; ctx.fillText("CLICK A CITY TO EXPLORE", SX+SW/2, SY+SH-30); ctx.globalAlpha=1; }

    // ---- story panel ----
    if(land){ ctx.fillStyle="rgba(217,182,90,0.30)"; ctx.fillRect(PX,PY,1,PH); }
    else { ctx.fillStyle="rgba(217,182,90,0.30)"; ctx.fillRect(PX,PY,PW,1); }
    const pg=ctx.createLinearGradient(PX,PY,PX,PY+PH); pg.addColorStop(0,"rgba(7,8,16,0.6)"); pg.addColorStop(1,"rgba(5,6,12,0.97)");
    ctx.fillStyle=pg; ctx.fillRect(PX,PY,PW,PH);
    const ca=CITY[chapter].a, pad=Math.max(18,PW*0.07);
    ctx.fillStyle=ca; ctx.fillRect(PX+pad-12,PY+(land?PH*0.13:PH*0.14),3,land?PH*0.42:PH*0.5);
    ctx.globalAlpha=capAlpha; ctx.textAlign='left';
    let yc = PY + (land?PH*0.17:PH*0.18);
    const kf=Math.max(7,Math.min(10,Math.floor(PW/30)));
    ctx.font=kf+'px "Press Start 2P", monospace'; ctx.textBaseline='alphabetic'; ctx.fillStyle=ca; ctx.fillText(CITY[chapter].kicker, PX+pad, yc); yc+=kf+15;
    const rf=Math.max(11,Math.min(15,Math.floor(PW/18)));
    ctx.font=rf+'px "Press Start 2P", monospace'; ctx.save(); ctx.shadowColor=ca; ctx.shadowBlur=8; ctx.fillStyle="#f6f2e6"; ctx.fillText(CITY[chapter].role, PX+pad, yc); ctx.restore(); yc+=rf+16;
    const sf=Math.max(8,Math.min(11,Math.floor(PW/42)));
    ctx.font=sf+'px "Press Start 2P", monospace';
    const full=CITY[chapter].story, shown=Math.min(full.length,Math.floor((T-capStartT)/CHARMS)), lines=wrap(full.slice(0,shown), PW-pad*2);
    ctx.fillStyle="#c7cee0"; const lh=sf*1.75, maxL=land?6:4;
    for(let i=0;i<lines.length && i<maxL;i++){ ctx.fillText(lines[i], PX+pad, yc); yc+=lh; }
    yc+=6;
    const kf2=Math.max(7,Math.min(9,Math.floor(PW/48)));
    ctx.font=kf2+'px "Press Start 2P", monospace';
    const sklines=wrap(CITY[chapter].skills, PW-pad*2);
    ctx.fillStyle=GOLD; for(let i=0;i<sklines.length && i<2;i++){ ctx.fillText(sklines[i], PX+pad, yc); yc+=kf2*1.7; }
    ctx.globalAlpha=1;

    const trayY=PY+PH-Math.max(20,PH*0.09), tps=Math.max(2,Math.floor(Math.max(20,PH*0.09)/9));
    const slotW=Math.min(PW*0.22,72), startX=PX+(PW-slotW*CITY.length)/2;
    for(let i=0;i<CITY.length;i++){ const sx=startX+i*slotW+slotW/2, has=captured.indexOf(i)>=0, g=SP[CITY[i].piece];
      const w=g[0].length*tps, h=g.length*tps, qx=Math.round(sx-w/2), qy=Math.round(trayY-h/2);
      if(has){ ctx.save(); ctx.shadowColor=CITY[i].a; ctx.shadowBlur=8; drawSprite(g,qx,qy,tps,{"*":CITY[i].a,"o":"#15131f"}); ctx.restore(); }
      else { ctx.globalAlpha=0.16; drawSprite(g,qx,qy,tps,{"*":"#3a3f5c","o":"#262a3e"}); ctx.globalAlpha=1; } }
  }

  function frame(ts){
    if(prevTs===null)prevTs=ts; const dt=Math.min(60,ts-prevTs); prevTs=ts; T+=dt;
    if(!paused && phase==="story"){ const typeDone=capStartT+CITY[chapter].story.length*CHARMS;
      if(T>typeDone+HOLD_AFTER && chapter<CITY.length-1) beginMove();
      else if(T>typeDone+HOLD_END && chapter>=CITY.length-1) reset();
    }
    const fTarget = paused?1:(phase==="story"?0.55:0.15);
    focusAmt += (fTarget-focusAmt)*0.05;
    themeMix += (1-themeMix)*0.04; spawnBg();
    const kp=trailPos();
    capAlpha += ((phase==="story"?1:0)-capAlpha)*0.12;
    drawAll(kp);
    requestAnimationFrame(frame);
  }
  function renderStatic(){ resize(); chapter=CITY.length-1; prevChapter=chapter; themeMix=1; focusAmt=1; captured=[0,1,2,3]; capAlpha=1; T=1e9; capStartT=0; drawAll(cpt(chapter)); }

  stage.addEventListener('click', (e)=>{ if(reduce)return; interacted=true;
    const r=cv.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top, hitR=Math.max(26,Math.min(SW,SH)*0.05);
    let hit=-1; for(let i=0;i<=chapter;i++){ const p=cpt(i); if(Math.hypot(p[0]-mx,p[1]-my)<hitR) hit=i; }
    if(hit>=0){ paused=true; jumpTo(hit); }
    else { paused=false; capStartT=T; }
  });
  window.addEventListener('resize', ()=>{ resize(); if(reduce) renderStatic(); });
  function boot(){ resize(); if(reduce){ renderStatic(); return; } requestAnimationFrame(frame); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>{ resize(); }); }
  boot();
})();
</script>
</body>
