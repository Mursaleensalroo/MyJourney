<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mursaleen — The Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
<style>
  :root{ --ink:#070810; --gold:#d9b65a; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:var(--ink); }
  body{ display:flex; align-items:center; justify-content:center; min-height:100vh; padding:18px; }
  .stage{
    position:relative; width:min(92vw, 720px); aspect-ratio: 1 / 1.24;
    background:#070810; border:1px solid rgba(217,182,90,.55); border-radius:8px;
    box-shadow:0 0 0 1px #070810, 0 0 0 4px rgba(217,182,90,.16), 0 30px 90px rgba(0,0,0,.78);
    overflow:hidden; cursor:pointer;
  }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
  .sig{ position:absolute; right:12px; top:9px; z-index:2; font-family:'Press Start 2P',monospace; font-size:7px; color:var(--gold); opacity:.55; letter-spacing:2px; pointer-events:none; }
</style>
</head>
<body>
  <div class="stage" id="stage" aria-label="An 8-bit chess knight travels a glowing trail through Mursaleen's career across four stops, each with its industry backdrop and a typed story: Kashmir agri-tech, Maharashtra ed-tech, Jammu education, Goa zero-to-one.">
    <canvas id="c"></canvas>
    <div class="sig">MURSALEEN</div>
  </div>
<script>
(function(){
  const stage=document.getElementById('stage'), cv=document.getElementById('c'), ctx=cv.getContext('2d');
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const GOLD="#d9b65a";

  const CITY=[
    {nx:0.40,ny:0.10,label:"KASHMIR",a:"#7cc4ff",piece:"pawn",lx:0,ly:16,al:"center",
      kicker:"KASHMIR / 2019-21", role:"ROOT2FRUIT - AGRI + SOLAR",
      story:"Ops for an agri-tech startup across 9 districts of Kashmir - apple supply chains, solar, Rs 5 Cr, 100+ people."},
    {nx:0.34,ny:0.55,label:"MAHARASHTRA",a:"#ffcf6b",piece:"knight",lx:-10,ly:0,al:"right",
      kicker:"MAHARASHTRA / 2022-23", role:"BYJU'S - ED-TECH",
      story:"Ran a Byju's learning centre - students, teachers, daily ops. Zonal-high CSAT 8.9, a team of 6 that never left."},
    {nx:0.53,ny:0.18,label:"JAMMU",a:"#6fb0ff",piece:"bishop",lx:10,ly:0,al:"left",
      kicker:"JAMMU / 2023-26", role:"PHYSICSWALLAH - EDUCATION",
      story:"Built PhysicsWallah's Jammu centre from zero - 60+ faculty, 4,000+ learners, new systems, new things."},
    {nx:0.45,ny:0.74,label:"GOA - NOW",a:"#ff9b6b",piece:"king",lx:0,ly:-16,al:"center",
      kicker:"GOA / NOW", role:"DELHIVERY - 0 TO 1",
      story:"Now: zero to one inside Delhivery - partnering with colleges to build what comes next."}
  ];

  const KN=["....oooo....","...obbbboo..","..obbbbbbbo.",".obbbbbbbbbo",".obmbbbbbbbo","oobmbbbbbbbo","obmmobbbbbbo",".ommbbbbbbbo","..oobbbbbbo.","...obbbbbbo.","..obbbbbbbbo",".oobbbbbbbbo",".oooooooooo."];
  const SP={
    pawn:["..ooo..",".o***o.",".o***o.","..ooo..",".o***o.","o*****o","o*****o","ooooooo"],
    bishop:["...o...","..o*o..",".o***o.",".o*o*o.",".o***o.",".o***o.","..o*o..","o*****o","ooooooo"],
    king:["...o...","..ooo..","...o...",".o***o.","o*****o","o*****o","o*****o","o*****o","ooooooo"],
    knight:KN
  };
  const S_TREE=["...ggggg...","..ggggggg..",".gggrgggrg.","ggggggggggg","ggrggggggrg","gggggrggggg",".ggggggggg.","..ggggggg..","....ttt....","....ttt....","...ttttt..."];
  const S_SOLAR=["fffffffffff","f.f.f.f.f.f","fffffffffff","f.f.f.f.f.f","fffffffffff","....ppp....","...ppppp..."];
  const S_CAP=[".....o.....","...ooooo...",".ooooooooo.","ooooooooooo","..mmmmmm...","..m...mt...",".......t..."];
  const S_BOOK=["bbbbbbbbb","bwwwwwwwb","bwbbbbbwb","bwwwwwwwb","bwbbbbbwb","bbbbbbbbb"];
  const S_SCREEN=["sssssssss","s.......s","s.bbbbb.s","s.b...b.s","s.bbbbb.s","s.......s","sssssssss","...sss..."];
  const S_PALM=["ff.....ff",".ff.f.ff.","..fffff..","....t....","....t....","...ttt..."];
  const S_ROCKET=["...w...","..www..",".wwwww.",".wbwbw.",".wwwww.",".wwwww.",".w.w.w.","f.....f",".f.f.f."];

  function spriteAt(g,cx,cy,ps,map,alpha,glow){ const w=g[0].length*ps, h=g.length*ps, x=Math.round(cx-w/2), y=Math.round(cy-h/2);
    ctx.save(); ctx.globalAlpha=alpha; if(glow){ctx.shadowColor=glow;ctx.shadowBlur=8;}
    for(let r=0;r<g.length;r++){const row=g[r]; for(let c=0;c<row.length;c++){const ch=row[c]; if(ch==='.'||ch===' ')continue; const col=map[ch]; if(!col)continue; ctx.fillStyle=col; ctx.fillRect(x+c*ps,y+r*ps,ps,ps);}}
    ctx.restore(); }
  function drawSprite(g,x,y,ps,map){ for(let r=0;r<g.length;r++){const row=g[r]; for(let c=0;c<row.length;c++){const ch=row[c]; if(ch==='.'||ch===' ')continue; const col=map[ch]; if(!col)continue; ctx.fillStyle=col; ctx.fillRect(Math.round(x+c*ps),Math.round(y+r*ps),ps,ps);}}}

  let W=0,H=0,dpr=1,rx=0,ry=0,rw=0,rh=0,panelY=0,panelH=0,gy=0,U=1,stars=[];
  function resize(){ dpr=Math.min(window.devicePixelRatio||1,2);
    const rect=stage.getBoundingClientRect(); W=rect.width; H=rect.height;
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.imageSmoothingEnabled=false;
    panelY=Math.round(H*0.66); panelH=H-panelY;
    rx=W*0.13; ry=22; rw=W*0.74; rh=panelY-ry-14; gy=panelY-H*0.02; U=Math.max(1,Math.round(W/280));
    stars=[]; for(let i=0;i<54;i++)stars.push({x:Math.random()*W,y:Math.random()*panelY,p:Math.random()*6.28,s:Math.random()<0.85?1:2});
  }
  function cpt(i){ return [rx+CITY[i].nx*rw, ry+CITY[i].ny*rh]; }
  function easeIO(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
  function diamond(x,y,s){ ctx.beginPath(); ctx.moveTo(x,y-s); ctx.lineTo(x+s,y); ctx.lineTo(x,y+s); ctx.lineTo(x-s,y); ctx.closePath(); }

  function sun(cx,cy,r,col,al){ ctx.save(); ctx.globalAlpha=al; const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r); g.addColorStop(0,col); g.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy,r,0,6.28); ctx.fill(); ctx.restore(); }
  function atom(cx,cy,r,col,al){ ctx.save(); ctx.globalAlpha=al; ctx.strokeStyle=col; ctx.lineWidth=2; ctx.shadowColor=col; ctx.shadowBlur=8;
    for(let k=0;k<3;k++){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(k*Math.PI/3 + T*0.0006); ctx.beginPath(); ctx.ellipse(0,0,r,r*0.4,0,0,6.28); ctx.stroke(); ctx.restore(); }
    const ea=T*0.003; ctx.fillStyle="#fff"; ctx.fillRect(cx+Math.cos(ea)*r-1.5,cy+Math.sin(ea)*r*0.4-1.5,3,3);
    ctx.fillStyle=col; ctx.fillRect(cx-2,cy-2,5,5); ctx.restore(); }
  function building(cx,by,w,h,col,al){ ctx.save(); ctx.globalAlpha=al; ctx.fillStyle=col; ctx.fillRect(cx-w/2,by-h,w,h);
    ctx.fillStyle="rgba(255,235,170,0.6)"; const wx=Math.max(2,Math.floor(w/7)); for(let yy=by-h+wx;yy<by-wx;yy+=wx*2)for(let xx=cx-w/2+wx;xx<cx+w/2-wx;xx+=wx*2)ctx.fillRect(xx,yy,wx,wx);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx+w/2+6,by); ctx.lineTo(cx+w/2+6,by-h-16); ctx.lineTo(cx+w/2+6-w*0.7,by-h-16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+w/2+6-w*0.6,by-h-16); ctx.lineTo(cx+w/2+6-w*0.6,by-h-6); ctx.stroke(); ctx.restore(); }
  function college(cx,by,w,h,col,al){ ctx.save(); ctx.globalAlpha=al; ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(cx-w/2-5,by-h+9); ctx.lineTo(cx,by-h-7); ctx.lineTo(cx+w/2+5,by-h+9); ctx.closePath(); ctx.fill();
    ctx.fillRect(cx-w/2-5,by-h+9,w+10,4);
    const cols=4, gap=w/cols; for(let i=0;i<=cols;i++){ const xx=cx-w/2+i*gap; ctx.fillRect(xx-2,by-h+15,4,h-17); }
    ctx.fillRect(cx-w/2-7,by-4,w+14,4); ctx.restore(); }

  function drawTheme(idx,al){ if(al<=0.02)return; const A=al; const c=CITY[idx].a;
    // mood wash from below
    ctx.save(); ctx.globalAlpha=A*0.16; const wash=ctx.createLinearGradient(0,gy,0,ry); wash.addColorStop(0,c); wash.addColorStop(1,"rgba(0,0,0,0)"); ctx.fillStyle=wash; ctx.fillRect(0,ry,W,gy-ry); ctx.restore();
    if(idx===0){
      sun(W*0.80,ry+H*0.06,H*0.12,"rgba(255,222,150,0.6)",A*0.8);
      ctx.save(); ctx.globalAlpha=A*0.4; ctx.fillStyle="#1b2b46"; ctx.beginPath(); ctx.moveTo(0,gy);
      const pk=[0.11,0.06,0.14,0.07,0.12,0.08,0.13,0.06,0.11]; for(let i=0;i<pk.length;i++){const x=(i/(pk.length-1))*W; ctx.lineTo(x,gy-pk[i]*H);} ctx.lineTo(W,gy); ctx.closePath(); ctx.fill(); ctx.restore();
      spriteAt(S_TREE,W*0.12,gy-26*U,U*3.6,{g:"#3f8f54",r:"#e1574a",t:"#7a4a2a"},A,null);
      spriteAt(S_TREE,W*0.30,gy-20*U,U*2.7,{g:"#3f8f54",r:"#e1574a",t:"#7a4a2a"},A*0.92,null);
      spriteAt(S_TREE,W*0.90,gy-22*U,U*3.0,{g:"#3f8f54",r:"#e1574a",t:"#7a4a2a"},A*0.95,null);
      spriteAt(S_SOLAR,W*0.20,ry+H*0.12,U*2.8,{f:"#4d7fc0",p:"#7a8090"},A*0.9,c);
    } else if(idx===1){
      spriteAt(S_CAP,W*0.15,ry+H*0.10,U*3.0,{o:"#ece6d2",m:"#34304e",t:GOLD},A,c);
      spriteAt(S_SCREEN,W*0.85,ry+H*0.13,U*2.6,{s:"#cfd6e6",b:c},A*0.9,c);
      spriteAt(S_BOOK,W*0.84,gy-14*U,U*3.0,{b:"#c98a3a",w:"#f2ead4"},A,c);
      spriteAt(S_BOOK,W*0.78,gy-14*U,U*3.0,{b:"#5b8fd0",w:"#f2ead4"},A*0.85,c);
    } else if(idx===2){
      atom(W*0.82,ry+H*0.12,H*0.085,c,A);
      building(W*0.14,gy,W*0.13,H*0.18,"#27406a",A);
      building(W*0.30,gy,W*0.09,H*0.12,"#223a5e",A*0.85);
    } else {
      sun(W*0.5,gy-4,H*0.18,"rgba(255,140,90,0.4)",A*0.85);
      spriteAt(S_PALM,W*0.11,gy-18*U,U*3.4,{f:"#3f8f54",t:"#8a5a30"},A,null);
      spriteAt(S_PALM,W*0.24,gy-14*U,U*2.6,{f:"#3f8f54",t:"#8a5a30"},A*0.85,null);
      college(W*0.85,gy,W*0.13,H*0.13,"#caa86a",A);
      spriteAt(S_ROCKET,W*0.80,ry+H*0.11,U*3.0,{w:"#e6e9f2",b:"#7cc4ff",f:"#ff9b6b"},A,c);
    }
  }

  let bgp=[];
  function spawnBg(){ const i=chapter; if(Math.random()>0.2)return;
    if(i===0){ bgp.push({x:Math.random()*W,y:ry-10,vx:(Math.random()-0.5)*0.2,vy:0.3+Math.random()*0.4,life:1,col:"230,90,74"}); }
    else { const col=i===1?"255,207,107":i===2?"111,176,255":"255,155,107"; bgp.push({x:rx+Math.random()*rw,y:gy,vx:(Math.random()-0.5)*0.2,vy:-(0.3+Math.random()*0.5),life:1,col:col}); }
  }

  let chapter=0,captured=[0],phase="story",parts=[],rings=[],capAlpha=0,prevChapter=0,themeMix=1;
  let T=0,prevTs=null,capStartT=0,hopStartT=0; const HOP=1500, CHARMS=27, HOLD_AFTER=2100, HOLD_END=3200;

  function setChapter(i){ prevChapter=chapter; chapter=i; themeMix=0; capStartT=T; }
  function beginMove(){ phase="move"; hopStartT=T; }
  function arrive(nc){ const p=cpt(nc); rings.push({x:p[0],y:p[1],t:0,col:CITY[nc].a});
    for(let k=0;k<18;k++){const a=Math.random()*6.28,s=0.6+Math.random()*2.2; parts.push({x:p[0],y:p[1],vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:CITY[nc].a});} }
  function reset(){ chapter=0; prevChapter=0; themeMix=1; captured=[0]; phase="story"; parts=[]; rings=[]; bgp=[]; capStartT=T; }

  function trailPos(){
    if(phase==="story"){ const b=cpt(chapter); return [b[0],b[1]-Math.abs(Math.sin(T*0.004))*2]; }
    const a=cpt(chapter), b=cpt(chapter+1);
    let t=(T-hopStartT)/HOP; if(t>1)t=1; const te=easeIO(t);
    let dx=b[0]-a[0],dy=b[1]-a[1],len=Math.hypot(dx,dy)||1, off=Math.min(80,len*0.16)*(chapter%2?-1:1);
    const mx=(a[0]+b[0])/2+(-dy/len)*off, my=(a[1]+b[1])/2+(dx/len)*off, u=1-te;
    const x=u*u*a[0]+2*u*te*mx+te*te*b[0], y=u*u*a[1]+2*u*te*my+te*te*b[1];
    if(t>=1){ const nc=chapter+1; captured.push(nc); arrive(nc); phase="story"; setChapter(nc); }
    return [x,y];
  }
  function wrap(text,maxW){ const words=text.split(' '); const lines=[]; let cur='';
    for(const w of words){ const test=cur?cur+' '+w:w; if(ctx.measureText(test).width>maxW && cur){ lines.push(cur); cur=w; } else cur=test; } if(cur)lines.push(cur); return lines; }

  function drawAll(kp){
    ctx.imageSmoothingEnabled=false;
    ctx.fillStyle="#070810"; ctx.fillRect(0,0,W,H);
    for(const st of stars){ const tw=0.5+0.5*Math.sin(T*0.002+st.p); ctx.fillStyle="rgba(190,205,255,"+tw*0.4+")"; ctx.fillRect(st.x,st.y,st.s,st.s); }

    if(prevChapter!==chapter){ drawTheme(prevChapter,(1-themeMix)); drawTheme(chapter,themeMix); } else drawTheme(chapter,1);

    for(let i=bgp.length-1;i>=0;i--){const p=bgp[i]; p.x+=p.vx;p.y+=p.vy;p.life-=0.009; if(p.life<=0||p.y>panelY){bgp.splice(i,1);continue;}
      ctx.globalAlpha=p.life*0.6; ctx.fillStyle="rgb("+p.col+")"; ctx.fillRect(Math.round(p.x),Math.round(p.y),2,2); ctx.globalAlpha=1; }

    const vg=ctx.createRadialGradient(W/2,panelY*0.5,panelY*0.3,W/2,panelY*0.5,panelY*0.8);
    vg.addColorStop(0,"rgba(7,8,16,0)"); vg.addColorStop(1,"rgba(3,3,9,0.55)"); ctx.fillStyle=vg; ctx.fillRect(0,0,W,panelY);

    // route + trail
    ctx.save(); ctx.setLineDash([2,5]); ctx.lineWidth=1.5; ctx.strokeStyle="rgba(217,182,90,0.22)"; ctx.beginPath();
    for(let i=0;i<CITY.length;i++){const p=cpt(i); i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);} ctx.stroke(); ctx.restore();
    if(chapter>0||phase==="move"){
      ctx.save(); ctx.shadowColor="rgba(255,216,140,0.9)"; ctx.shadowBlur=14; ctx.lineCap="round"; ctx.lineJoin="round";
      ctx.strokeStyle="rgba(255,224,150,0.92)"; ctx.lineWidth=3; ctx.beginPath();
      for(let i=0;i<=chapter;i++){const p=cpt(i); i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]);}
      if(phase==="move")ctx.lineTo(kp[0],kp[1]); ctx.stroke(); ctx.restore();
    }

    // pins + labels
    for(let i=0;i<CITY.length;i++){ const p=cpt(i), reached=captured.indexOf(i)>=0, cur=(i===chapter), pulse=0.5+0.5*Math.sin(T*0.005+i), s=Math.max(4,rw*0.016);
      ctx.save(); ctx.shadowColor=CITY[i].a; ctx.shadowBlur=reached?14:(8+6*pulse);
      ctx.globalAlpha=reached?1:(0.5+0.3*pulse); ctx.fillStyle=CITY[i].a; diamond(p[0],p[1],s); ctx.fill(); ctx.restore();
      ctx.globalAlpha=reached?0.95:0.55; ctx.fillStyle="#fffaf0"; diamond(p[0],p[1],s*0.42); ctx.fill(); ctx.globalAlpha=1;
      if(cur){ const rr=s+4+(T%1100)/1100*s*2, ra=1-(T%1100)/1100; ctx.globalAlpha=ra*0.6; ctx.strokeStyle=CITY[i].a; ctx.lineWidth=1.5; diamond(p[0],p[1],rr); ctx.stroke(); ctx.globalAlpha=1; }
      const lf=Math.max(6,Math.min(9,Math.floor(W/80)));
      ctx.font=lf+'px "Press Start 2P", monospace'; ctx.textAlign=CITY[i].al; ctx.textBaseline='middle';
      ctx.globalAlpha=reached||cur?0.95:0.42;
      ctx.save(); ctx.shadowColor=CITY[i].a; ctx.shadowBlur=cur?6:0; ctx.fillStyle=reached||cur?"#f4efe0":"#9fb0d0";
      ctx.fillText(CITY[i].label, p[0]+CITY[i].lx, p[1]+CITY[i].ly); ctx.restore(); ctx.globalAlpha=1;
    }

    for(let i=rings.length-1;i>=0;i--){const rg=rings[i]; rg.t+=0.03; if(rg.t>=1){rings.splice(i,1);continue;}
      ctx.globalAlpha=(1-rg.t)*0.7; ctx.strokeStyle=rg.col; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(rg.x,rg.y,rg.t*rw*0.07,0,6.28); ctx.stroke(); ctx.globalAlpha=1; }
    for(let i=parts.length-1;i>=0;i--){const pt=parts[i]; pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.05;pt.life-=0.025;
      if(pt.life<=0){parts.splice(i,1);continue;} ctx.globalAlpha=pt.life; ctx.fillStyle=pt.col; ctx.fillRect(Math.round(pt.x),Math.round(pt.y),2,2); ctx.globalAlpha=1; }

    // knight
    const ps=Math.max(2,Math.floor(rw*0.05/12)); const sw=12*ps, sh=13*ps, ox=Math.round(kp[0]-sw/2), oy=Math.round(kp[1]-sh/2);
    ctx.save(); const kg=ctx.createRadialGradient(kp[0],kp[1],0,kp[0],kp[1],sw); kg.addColorStop(0,"rgba(255,238,200,0.5)"); kg.addColorStop(1,"rgba(255,238,200,0)"); ctx.fillStyle=kg; ctx.beginPath(); ctx.arc(kp[0],kp[1],sw,0,6.28); ctx.fill(); ctx.restore();
    drawSprite(KN,ox,oy,ps,{o:"#1b1c28",b:"#f8f3e6",m:"#d3c4a2"});

    // compass
    const cox=W-24, coy=34; ctx.globalAlpha=0.5; ctx.strokeStyle=GOLD; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cox,coy+7); ctx.lineTo(cox,coy-7); ctx.lineTo(cox-3,coy-3); ctx.moveTo(cox,coy-7); ctx.lineTo(cox+3,coy-3); ctx.stroke();
    ctx.font='6px "Press Start 2P", monospace'; ctx.textAlign='center'; ctx.fillStyle=GOLD; ctx.fillText("N",cox,coy-13); ctx.globalAlpha=1;

    // ---- story panel ----
    const pg=ctx.createLinearGradient(0,panelY,0,H); pg.addColorStop(0,"rgba(7,8,16,0.55)"); pg.addColorStop(0.25,"rgba(6,7,14,0.92)"); pg.addColorStop(1,"rgba(5,6,12,0.98)");
    ctx.fillStyle=pg; ctx.fillRect(0,panelY,W,panelH);
    const ca=CITY[chapter].a;
    ctx.fillStyle="rgba(217,182,90,0.35)"; ctx.fillRect(0,panelY,W,1);
    const px=Math.max(16,W*0.06);
    ctx.fillStyle=ca; ctx.fillRect(px-10,panelY+panelH*0.13,3,panelH*0.46);
    ctx.globalAlpha=capAlpha;
    // kicker
    const kf=Math.max(7,Math.min(9,Math.floor(W/92)));
    ctx.font=kf+'px "Press Start 2P", monospace'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillStyle=ca; ctx.fillText(CITY[chapter].kicker, px, panelY+panelH*0.20);
    // role
    const rf=Math.max(10,Math.min(13,Math.floor(W/52)));
    ctx.font=rf+'px "Press Start 2P", monospace';
    ctx.save(); ctx.shadowColor=ca; ctx.shadowBlur=8; ctx.fillStyle="#f6f2e6"; ctx.fillText(CITY[chapter].role, px, panelY+panelH*0.37); ctx.restore();
    // story (typed + wrapped)
    const sf=Math.max(8,Math.min(10,Math.floor(W/82)));
    ctx.font=sf+'px "Press Start 2P", monospace';
    const full=CITY[chapter].story, shown=Math.min(full.length,Math.floor((T-capStartT)/CHARMS));
    const lines=wrap(full.slice(0,shown), W-px*2);
    const lh=sf*1.75; let yy=panelY+panelH*0.52;
    ctx.fillStyle="#c7cee0";
    for(let i=0;i<lines.length && i<3;i++){ ctx.fillText(lines[i], px, yy); yy+=lh; }
    ctx.globalAlpha=1;

    // pieces row at panel bottom
    const trayY=panelY+panelH-Math.max(16,panelH*0.13), tps=Math.max(2,Math.floor((panelH*0.13)/9)), slotW=rw/CITY.length;
    for(let i=0;i<CITY.length;i++){ const sx=rx+i*slotW+slotW/2, has=captured.indexOf(i)>=0, g=SP[CITY[i].piece];
      const w=g[0].length*tps, h=g.length*tps, qx=Math.round(sx-w/2), qy=Math.round(trayY-h/2);
      if(has){ ctx.save(); ctx.shadowColor=CITY[i].a; ctx.shadowBlur=8; drawSprite(g,qx,qy,tps,{"*":CITY[i].a,"o":"#15131f"}); ctx.restore(); }
      else { ctx.globalAlpha=0.16; drawSprite(g,qx,qy,tps,{"*":"#3a3f5c","o":"#262a3e"}); ctx.globalAlpha=1; } }
  }

  function frame(ts){
    if(prevTs===null)prevTs=ts; const dt=Math.min(60,ts-prevTs); prevTs=ts; T+=dt;
    if(phase==="story"){ const typeDone=capStartT+CITY[chapter].story.length*CHARMS;
      if(T>typeDone+HOLD_AFTER && chapter<CITY.length-1) beginMove();
      else if(T>typeDone+HOLD_END && chapter>=CITY.length-1) reset();
    }
    themeMix += (1-themeMix)*0.04; spawnBg();
    const kp=trailPos();
    capAlpha += ((phase==="story"?1:0)-capAlpha)*0.12;
    drawAll(kp);
    requestAnimationFrame(frame);
  }
  function renderStatic(){ resize(); chapter=CITY.length-1; prevChapter=chapter; themeMix=1; captured=[0,1,2,3]; capAlpha=1; T=1e9; capStartT=0; drawAll(cpt(chapter)); }

  stage.addEventListener('click', ()=>{ if(!reduce) reset(); });
  window.addEventListener('resize', ()=>{ resize(); if(reduce) renderStatic(); });
  function boot(){ resize(); if(reduce){ renderStatic(); return; } requestAnimationFrame(frame); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>{ resize(); }); }
  boot();
})();
</script>
</body>
</html>
